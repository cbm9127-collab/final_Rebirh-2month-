<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Re:birth — 기록 히스토리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFCF2; --card:#FFFFFF; --card2:#FFF8E1;
  --border:rgba(245,158,11,0.20); --border2:rgba(245,158,11,0.40);
  --blue:#F59E0B; --blue2:#FBBF24; --blue3:#D97706;
  --blue-dim:rgba(251,191,36,0.14);
  --white:#3A3526; --grey:#8A8265; --grey2:#B8AE8C;
  --green:#16A34A; --red:#DC2626; --amber:#D97706;
  --r:12px; --rs:9px;
  --shadow:0 1px 3px rgba(180,150,60,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:60px;}

.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,252,242,.92);backdrop-filter:blur(10px);z-index:50;}
.back-btn{background:#fff;border:1px solid var(--border2);border-radius:8px;color:var(--grey);font-size:12px;padding:6px 12px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.back-btn:hover{color:var(--white);border-color:var(--blue);}
.header-title{font-size:16px;font-weight:800;color:var(--blue3);letter-spacing:1px;}

.wrap{max-width:680px;margin:0 auto;padding:0 18px;}
.section{margin:18px 0;}
.sec-label{font-size:10px;letter-spacing:2.5px;font-weight:700;color:var(--blue3);text-transform:uppercase;margin-bottom:10px;}

/* 요약 카드 */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.sum-card{background:var(--card2);border-radius:var(--rs);padding:12px 10px;text-align:center;}
.sum-card.plain{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);}
.sum-num{font-size:19px;font-weight:800;color:var(--blue3);line-height:1.1;}
.sum-num small{font-size:11px;font-weight:700;}
.sum-num.dk{color:var(--white);}
.sum-num.up{color:var(--red);}.sum-num.down{color:var(--green);}
.sum-lbl{font-size:10px;color:var(--grey);margin-top:4px;}

/* 주간 테이블 */
.week-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.week-table{width:100%;border-collapse:collapse;font-size:12px;}
.week-table th{background:var(--card2);color:var(--grey);font-weight:600;padding:8px 8px;text-align:center;}
.week-table th:first-child{text-align:left;}
.week-table td{padding:8px 8px;text-align:center;border-top:1px solid var(--border);color:var(--white);}
.week-table tr:hover td{background:var(--blue-dim);}
.wk-period{font-weight:700;color:var(--blue3);text-align:left!important;white-space:nowrap;}
.wk-cur td{background:#FFFBEB;}

/* 수분·영양제 달성 */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ach-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);}
.ach-head{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:13px;font-weight:700;}
.ach-head i{color:var(--blue3);font-style:normal;}
.ach-val{font-size:24px;font-weight:800;color:var(--blue3);line-height:1;}
.ach-val span{font-size:12px;color:var(--grey);font-weight:600;}

/* 필터 */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.filter-inp{background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--white);font-size:12px;padding:6px 11px;outline:none;font-family:inherit;}
.filter-inp:focus{border-color:var(--blue);}
.result-count{font-size:11px;color:var(--grey);margin-left:auto;}

/* 주간 운동 카드 */
.wo-week{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;}
.wo-week-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.wo-week-period{font-size:14px;font-weight:800;color:var(--blue3);}
.wo-week-stat{font-size:11px;color:var(--green);font-weight:700;}
.wo-day{margin-bottom:10px;}
.wo-day:last-child{margin-bottom:0;}
.wo-day-date{font-size:12px;font-weight:700;color:var(--white);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.wo-day-date .dow{font-size:10px;color:var(--grey);font-weight:500;}
.ex-block{background:var(--card2);border-radius:var(--rs);padding:9px 11px;margin-bottom:6px;}
.ex-block:last-child{margin-bottom:0;}
.ex-block.skip{opacity:.55;}
.ex-line1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ex-nm{font-size:13px;font-weight:700;color:var(--white);}
.ex-var{font-size:10px;color:var(--grey);font-weight:500;margin-left:5px;}
.ex-done{font-size:11px;color:var(--green);font-weight:700;}
.ex-todo{font-size:11px;color:var(--grey2);font-weight:700;}
.ex-sets{font-size:12px;color:var(--white);line-height:1.6;}
.ex-memo{font-size:11px;color:var(--grey);margin-top:4px;font-style:italic;line-height:1.6;}

/* 일별 카드 (간소화 + 메모 강조) */
.rec-list{display:flex;flex-direction:column;gap:8px;}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:13px 15px;}
.rec-head{margin-bottom:8px;}
.rec-date{font-size:13px;font-weight:800;color:var(--white);}
.rec-dow{font-size:11px;color:var(--grey);font-weight:600;}
.rec-phase{font-size:10px;color:var(--blue3);font-weight:700;background:var(--blue-dim);padding:1px 7px;border-radius:5px;}
.rec-summary{font-size:12px;color:var(--grey);font-weight:600;display:flex;flex-wrap:wrap;align-items:center;gap:3px;}
.rec-summary .dot{color:var(--grey2);font-style:normal;margin:0 2px;}
.rec-note-big{font-size:14px;color:var(--white);font-weight:500;background:var(--card2);border-left:3px solid var(--blue);border-radius:8px;padding:11px 13px;line-height:1.65;margin-top:9px;}

/* 상태 */
.state-box{text-align:center;padding:40px 20px;}
.spinner{width:24px;height:24px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-title{font-size:13px;font-weight:600;color:var(--grey);}

@media(max-width:480px){
  .week-table{font-size:11px;}
  .week-table th,.week-table td{padding:6px 4px;}
}
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="index.html">← 대시보드</a>
  <div class="header-title">기록 히스토리</div>
  <div style="width:84px;"></div>
</div>

<div class="wrap">

  <!-- 1. 건강 지표 · 주간 현황 -->
  <div class="section">
    <div class="sec-label">건강 지표 · 주간 현황</div>
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-num" id="s-weight">—</div><div class="sum-lbl">최근 체중</div></div>
      <div class="sum-card"><div class="sum-num" id="s-waist">—</div><div class="sum-lbl">최근 허리둘레</div></div>
      <div class="sum-card"><div class="sum-num" id="s-wdiff">—</div><div class="sum-lbl">기간 체중 변화</div></div>
    </div>
    <div class="sum-grid">
      <div class="sum-card plain"><div class="sum-num dk" id="s-steps">—</div><div class="sum-lbl">평균 걸음수</div></div>
      <div class="sum-card plain"><div class="sum-num dk" id="s-sleep">—</div><div class="sum-lbl">평균 수면</div></div>
      <div class="sum-card plain"><div class="sum-num dk" id="s-diet">—</div><div class="sum-lbl">식단 준수</div></div>
    </div>
  </div>

  <!-- 주간 테이블 -->
  <div class="section">
    <div class="sec-label">주간 평균 (화~월)</div>
    <div id="weekly-wrap">
      <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중...</div></div>
    </div>
  </div>

  <!-- 2. 수분·영양제 달성 -->
  <div class="section">
    <div class="sec-label">수분 · 영양제 달성 <span style="font-weight:500;color:var(--grey2);text-transform:none;letter-spacing:0;" id="ach-range"></span></div>
    <div class="ach-grid">
      <div class="ach-card">
        <div class="ach-head"><i>💧</i> 수분 (4/4 기준)</div>
        <div class="ach-val" id="ach-water">— <span>/ — 일 완전 달성</span></div>
      </div>
      <div class="ach-card">
        <div class="ach-head"><i>💊</i> 영양제 (3/3 기준)</div>
        <div class="ach-val" id="ach-supp">— <span>/ — 일 완전 달성</span></div>
      </div>
    </div>
  </div>

  <!-- 3. 주간 운동 기록 -->
  <div class="section" id="workout">
    <div class="sec-label">주간 운동 기록 (세트 · 횟수 · 메모)</div>
    <div id="workout-wrap">
      <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중...</div></div>
    </div>
  </div>

  <!-- 4. 일별 상세 기록 -->
  <div class="section">
    <div class="sec-label">일별 상세 기록</div>
    <div class="filter-row">
      <input class="filter-inp" type="month" id="filter-month">
      <div class="result-count" id="result-count"></div>
    </div>
    <div class="rec-list" id="record-list">
      <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중...</div></div>
    </div>
  </div>

</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyMdLLgpi5Acnm_Hnnzho2boXE1__zQvQjqb-PwBPLY-es-S00EXb8am9O118Pa7f8/exec';
var DOW = ['일','월','화','수','목','금','토'];
var daily = [];   // 일별 기록
var weekly = [];  // 주간측정(체중/허리/체형)

function parseDate(raw){var s=String(raw).slice(0,10),p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function fmtMD(d){return (d.getMonth()+1)+'월 '+d.getDate()+'일';}
function fmtShort(d){return (d.getMonth()+1)+'/'+d.getDate();}
function avg(a){return a.length?+(a.reduce(function(s,v){return s+v;},0)/a.length).toFixed(1):null;}
// 주의 화요일(화~월 기준)
function weekTue(date){var d=new Date(date);d.setHours(0,0,0,0);var dow=d.getDay();var diff=dow>=2?dow-2:7+dow-2;d.setDate(d.getDate()-diff);return d;}
function cntNum(s){ // "3/4" → {got,need}
  if(s==null)return null;var m=String(s).match(/^(\d+)\s*\/\s*(\d+)/);return m?{got:+m[1],need:+m[2]}:null;
}
// "n/n" 형식만 유효, 그 외(날짜 등)는 빈 문자열
function validFrac(v){if(v==null)return '';return /^\d+\s*\/\s*\d+$/.test(String(v).trim())?String(v).trim():'';}

async function load(){
  try{
    var res=await fetch(GAS_URL);var rows=await res.json();
    daily=[];weekly=[];
    rows.forEach(function(r){
      var raw=String(r['날짜']||'');
      if(!raw)return;
      if(raw.startsWith('주간')){
        var wd=raw.replace('주간_','').slice(0,10);
        weekly.push({dateObj:parseDate(wd),weight:parseFloat(r['체중'])||null,waist:parseFloat(r['허리둘레']||r['허리'])||null});
        return;
      }
      var d=parseDate(raw);
      daily.push({
        date:raw.slice(0,10), dateObj:d, dow:DOW[d.getDay()],
        steps:parseInt(r['걸음수']||r['steps'])||null,
        sleep:parseFloat(r['수면시간']||r['sleep'])||null,
        water:validFrac(r['수분']||r['물']||r['water']),
        supp:validFrac(r['영양제']||r['supp']),
        diet:r['식단준수']||r['diet']||'',
        walk_am:r['아침산책']||r['walk_am']||'', walk_noon:r['점심산책']||r['walk_noon']||'', walk_pm:r['저녁산책']||r['walk_pm']||'',
        core:r['복근']||r['core']||'',
        pain:r['통증']||r['pain_achilles']||'',
        workouts:r['운동']||r['workouts']||'',
        phase:r['단계']||r['phase']||'',
        note:r['메모']||r['note']||''
      });
    });
    // 중복 제거 + 정렬(최근순)
    var seen={};
    daily=daily.filter(function(r){if(seen[r.date])return false;seen[r.date]=true;return true;})
               .sort(function(a,b){return b.dateObj-a.dateObj;});
    weekly.sort(function(a,b){return a.dateObj-b.dateObj;});

    renderSummary();
    renderWeekly();
    renderAchievement();
    renderWorkouts();
    renderList();
  }catch(e){
    ['weekly-wrap','workout-wrap','record-list'].forEach(function(id){
      document.getElementById(id).innerHTML='<div class="state-box"><div class="state-title">⚠️ 데이터 로드 실패: '+e.message+'</div></div>';
    });
  }
}

// ── 1. 요약 ─────────────────────────────────────
function renderSummary(){
  // 체중·허리: 주간측정 우선, 없으면 —
  var wRows=weekly.filter(function(r){return r.weight;});
  if(wRows.length){
    var last=wRows[wRows.length-1];
    document.getElementById('s-weight').innerHTML=last.weight+'<small>kg</small>';
    if(wRows.length>=2){
      var diff=(last.weight-wRows[0].weight).toFixed(1);
      var el=document.getElementById('s-wdiff');
      el.innerHTML=(diff>0?'+':'')+diff+'<small>kg</small>';
      el.className='sum-num '+(diff<0?'down':diff>0?'up':'');
    }
  }
  var waistRows=weekly.filter(function(r){return r.waist;});
  if(waistRows.length)document.getElementById('s-waist').innerHTML=waistRows[waistRows.length-1].waist+'<small>cm</small>';

  // 평균 걸음·수면·식단 (전체 일별 기준)
  var steps=daily.filter(function(r){return r.steps;}).map(function(r){return r.steps;});
  var sleeps=daily.filter(function(r){return r.sleep;}).map(function(r){return r.sleep;});
  var dietDays=daily.filter(function(r){return r.diet==='✅';}).length;
  if(steps.length)document.getElementById('s-steps').textContent=Math.round(steps.reduce(function(s,v){return s+v;},0)/steps.length).toLocaleString();
  if(sleeps.length)document.getElementById('s-sleep').textContent=avg(sleeps)+'h';
  document.getElementById('s-diet').textContent=dietDays+' / '+daily.length;
}

// ── 주간 테이블 ─────────────────────────────────
function renderWeekly(){
  var weeks={};
  daily.forEach(function(r){
    var tue=weekTue(r.dateObj),key=tue.getFullYear()+'-'+(tue.getMonth()+1)+'-'+tue.getDate();
    if(!weeks[key])weeks[key]={tue:tue,rows:[]};
    weeks[key].rows.push(r);
  });
  // 주간측정(체중/허리) 매핑
  var wkMeasure={};
  weekly.forEach(function(m){
    var tue=weekTue(m.dateObj),key=tue.getFullYear()+'-'+(tue.getMonth()+1)+'-'+tue.getDate();
    wkMeasure[key]=m;
  });
  var keys=Object.keys(weeks).sort(function(a,b){return weeks[b].tue-weeks[a].tue;});
  if(!keys.length){document.getElementById('weekly-wrap').innerHTML='<div class="state-box"><div class="state-title">기록이 없어요</div></div>';return;}

  var nowKey=(function(){var t=weekTue(new Date());return t.getFullYear()+'-'+(t.getMonth()+1)+'-'+t.getDate();})();
  var head='<tr><th>기간</th><th>체중</th><th>허리</th><th>걸음</th><th>수면</th><th>식단</th></tr>';
  var body=keys.map(function(key){
    var w=weeks[key],mon=new Date(w.tue);mon.setDate(w.tue.getDate()+6);
    var period=fmtShort(w.tue)+'~'+fmtShort(mon);
    var steps=w.rows.filter(function(r){return r.steps;}).map(function(r){return r.steps;});
    var sleeps=w.rows.filter(function(r){return r.sleep;}).map(function(r){return r.sleep;});
    var dietDays=w.rows.filter(function(r){return r.diet==='✅';}).length;
    var m=wkMeasure[key]||{};
    var avgS=steps.length?(Math.round(steps.reduce(function(s,v){return s+v;},0)/steps.length/100)/10)+'k':'—';
    return '<tr class="'+(key===nowKey?'wk-cur':'')+'">'
      +'<td class="wk-period">'+period+'</td>'
      +'<td>'+(m.weight?m.weight:'—')+'</td>'
      +'<td>'+(m.waist?m.waist:'—')+'</td>'
      +'<td>'+avgS+'</td>'
      +'<td>'+(avg(sleeps)?avg(sleeps)+'h':'—')+'</td>'
      +'<td>'+dietDays+'/'+w.rows.length+'</td>'
      +'</tr>';
  }).join('');
  document.getElementById('weekly-wrap').innerHTML='<div class="week-table-wrap"><table class="week-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
}

// ── 2. 수분·영양제 달성 일수 (이번 주 화~오늘) ───
function renderAchievement(){
  var tue=weekTue(new Date()),now=new Date();now.setHours(0,0,0,0);
  var inWeek=daily.filter(function(r){var x=new Date(r.dateObj);x.setHours(0,0,0,0);return x>=tue&&x<=now;});
  var waterDays=0,suppDays=0;
  inWeek.forEach(function(r){
    var w=cntNum(r.water);if(w&&w.got>=w.need)waterDays++;
    var s=cntNum(r.supp);if(s&&s.got>=s.need)suppDays++;
  });
  var n=inWeek.length;
  document.getElementById('ach-range').textContent='· 이번 주 '+fmtShort(tue)+'~'+fmtShort(now);
  document.getElementById('ach-water').innerHTML=waterDays+' <span>/ '+n+'일 완전 달성</span>';
  document.getElementById('ach-supp').innerHTML=suppDays+' <span>/ '+n+'일 완전 달성</span>';
}

// ── workouts 요약 문자열 파싱 ───────────────────
// "푸시업[기본 푸시업] 12/10 ✅ (S1:8개부터 흔들림) | 턱걸이[밴드 5단계] 8"
function parseWorkouts(str){
  if(!str)return [];
  return String(str).split('|').map(function(seg){
    seg=seg.trim();if(!seg)return null;
    var done=/✅/.test(seg);seg=seg.replace('✅','').trim();
    var memo='';var mm=seg.match(/\(([^)]*)\)\s*$/);if(mm){memo=mm[1].trim();seg=seg.slice(0,mm.index).trim();}
    var variant='';var vm=seg.match(/\[([^\]]*)\]/);if(vm){variant=vm[1].trim();seg=seg.replace(vm[0],'').trim();}
    var sp=seg.indexOf(' ');var name=sp>0?seg.slice(0,sp).trim():seg;var reps=sp>0?seg.slice(sp+1).trim():'';
    return {name:name,variant:variant,reps:reps,memo:memo,done:done};
  }).filter(Boolean);
}

// ── 3. 주간 운동 기록 (주차별 그룹) ─────────────
function renderWorkouts(){
  var woDays=daily.filter(function(r){return r.workouts&&r.workouts.trim();});
  if(!woDays.length){document.getElementById('workout-wrap').innerHTML='<div class="state-box"><div class="state-title">🏋️ 운동 기록이 아직 없어요</div><div style="font-size:11px;color:var(--grey2);margin-top:6px;">대시보드에서 저장했는데도 비어 있다면, 시트에 <b>운동</b> 헤더 컬럼이 있는지 확인하세요</div></div>';return;}
  var weeks={};
  woDays.forEach(function(r){
    var tue=weekTue(r.dateObj),key=tue.getFullYear()+'-'+(tue.getMonth()+1)+'-'+tue.getDate();
    if(!weeks[key])weeks[key]={tue:tue,rows:[]};
    weeks[key].rows.push(r);
  });
  var keys=Object.keys(weeks).sort(function(a,b){return weeks[b].tue-weeks[a].tue;});
  var html=keys.map(function(key){
    var w=weeks[key],mon=new Date(w.tue);mon.setDate(w.tue.getDate()+6);
    var rows=w.rows.slice().sort(function(a,b){return b.dateObj-a.dateObj;});
    var totSets=0,totReps=0,doneCnt=0;
    var daysHtml=rows.map(function(r){
      var exs=parseWorkouts(r.workouts);
      var exHtml=exs.map(function(ex){
        // reps "12/10" → 세트 표기
        var repArr=ex.reps?ex.reps.split('/').filter(function(x){return x!=='';}):[];
        repArr.forEach(function(x){var n=parseInt(x);if(!isNaN(n)){totReps+=n;}});
        totSets+=repArr.length;
        if(ex.done)doneCnt++;
        var setsTxt=repArr.length?repArr.map(function(x,i){return (i+1)+'세트 '+x+'회';}).join(' · '):'기록 없음';
        return '<div class="ex-block">'
          +'<div class="ex-line1"><div><span class="ex-nm">'+ex.name+'</span>'+(ex.variant?'<span class="ex-var">'+ex.variant+'</span>':'')+'</div>'
          +(ex.done?'<span class="ex-done">✓ 완료</span>':'<span class="ex-todo">미완료</span>')+'</div>'
          +'<div class="ex-sets">'+setsTxt+'</div>'
          +(ex.memo?'<div class="ex-memo">📝 '+ex.memo.replace(/S(\d+):/g,'$1세트 ')+'</div>':'')
          +'</div>';
      }).join('');
      return '<div class="wo-day"><div class="wo-day-date">'+fmtMD(r.dateObj)+' <span class="dow">'+r.dow+'</span></div>'+exHtml+'</div>';
    }).join('');
    return '<div class="wo-week"><div class="wo-week-head"><div class="wo-week-period">'+fmtShort(w.tue)+' ~ '+fmtShort(mon)+'</div>'
      +'<div class="wo-week-stat">완료 '+doneCnt+'개 · 총 '+totSets+'세트 · '+totReps+'회</div></div>'+daysHtml+'</div>';
  }).join('');
  document.getElementById('workout-wrap').innerHTML=html;
}

// ── 4. 일별 상세 ────────────────────────────────
function renderCard(r){
  // 핵심 지표 한 줄 요약(아이콘 + 값)
  var bits=[];
  if(r.steps)bits.push('👟 '+r.steps.toLocaleString());
  if(r.sleep)bits.push('😴 '+r.sleep+'h');
  var walks=[r.walk_am?'아침':'',r.walk_noon?'점심':'',r.walk_pm?'저녁':''].filter(Boolean);
  if(walks.length)bits.push('🚶 '+walks.join('·'));
  if(r.core==='✅')bits.push('💪 복근');
  if(r.diet==='✅')bits.push('🍽️ 준수');
  else if(r.diet==='❌')bits.push('🍽️ 미준수');
  if(r.pain!==''&&r.pain!=null&&!isNaN(parseInt(r.pain)))bits.push('🩹 '+parseInt(r.pain));
  // 식단 색상 클래스
  var dietCls = r.diet==='✅'?'sm-ok':r.diet==='❌'?'sm-no':'';
  var summary = bits.length?'<div class="rec-summary '+dietCls+'">'+bits.join('<i class="dot">·</i>')+'</div>':'';

  return '<div class="rec-card">'
    +'<div class="rec-head"><div class="rec-date">'+fmtMD(r.dateObj)+' <span class="rec-dow">'+r.dow+'</span>'+(r.phase?' <span class="rec-phase">'+r.phase+'</span>':'')+'</div></div>'
    + summary
    +(r.note?'<div class="rec-note-big">'+r.note+'</div>':'')
    +'</div>';
}
function renderList(){
  var month=document.getElementById('filter-month').value;
  var filtered=daily.filter(function(r){return !month||r.date.slice(0,7)===month;});
  document.getElementById('result-count').textContent=filtered.length+'개';
  if(!filtered.length){document.getElementById('record-list').innerHTML='<div class="state-box"><div class="state-title">📭 해당 기록이 없어요</div></div>';return;}
  document.getElementById('record-list').innerHTML=filtered.map(renderCard).join('');
}

document.getElementById('filter-month').addEventListener('change',renderList);
load();
</script>
