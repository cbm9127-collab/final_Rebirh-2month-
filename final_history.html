<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Re:birth — 기록 히스토리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1421; --card:#162032; --card2:#1A2845;
  --border:rgba(56,189,248,0.14); --border2:rgba(56,189,248,0.25);
  --blue:#38BDF8; --blue2:#0EA5E9; --blue3:#1D4ED8;
  --blue-dim:rgba(56,189,248,0.08);
  --white:#F0F9FF; --grey:#6B7FA8; --grey2:#3B4F6B;
  --green:#34D399; --red:#F87171; --amber:#FBBF24;
  --r:12px; --rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:60px;}

/* 헤더 */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,20,33,.92);backdrop-filter:blur(10px);z-index:50;}
.back-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--grey);font-size:12px;padding:6px 12px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.back-btn:hover{color:var(--white);border-color:var(--blue);}
.header-title{font-size:16px;font-weight:800;color:var(--blue);}

/* 레이아웃 */
.wrap{max-width:680px;margin:0 auto;padding:0 18px;}
.section{margin:18px 0;}
.sec-label{font-size:10px;letter-spacing:2.5px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:10px;}

/* 전체 요약 */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:13px 10px;text-align:center;}
.sum-num{font-size:20px;font-weight:800;color:var(--blue);line-height:1;}
.sum-lbl{font-size:10px;color:var(--grey);margin-top:4px;}

/* 주간 테이블 */
.week-table{width:100%;border-collapse:collapse;font-size:12px;}
.week-table th{background:var(--card2);color:var(--grey);font-weight:600;padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);}
.week-table td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);color:var(--white);}
.week-table tr:last-child td{border-bottom:none;}
.week-table tr:hover td{background:var(--blue-dim);}
.wk-period{font-weight:700;color:var(--blue);text-align:left!important;}
.wk-cur{background:var(--blue-dim);}

/* 필터 */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.filter-inp{background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--white);font-size:12px;padding:6px 11px;outline:none;font-family:inherit;width:120px;}
.filter-inp:focus{border-color:var(--blue);}
.result-count{font-size:11px;color:var(--grey);margin-left:auto;}

/* 데일리 카드 */
.rec-list{display:flex;flex-direction:column;gap:8px;}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.rec-date{font-size:13px;font-weight:700;}
.rec-dow{font-size:10px;color:var(--grey);margin-top:2px;}
.rec-weight{font-size:20px;font-weight:800;color:var(--blue);line-height:1;}
.rec-wdiff{font-size:11px;margin-top:2px;font-weight:600;}
.diff-down{color:var(--green);}
.diff-up{color:var(--red);}
.rec-metrics{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.rec-metric{background:var(--card2);border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;color:var(--grey);}
.rec-metric span{color:var(--white);}
.rec-metric.walk{border-left:2px solid var(--blue);}
.rec-metric.act{border-left:2px solid var(--green);}
.rec-metric.run{border-left:2px solid var(--green);}
.rec-note{font-size:11px;color:var(--grey);background:rgba(255,255,255,0.03);border-radius:6px;padding:7px 9px;line-height:1.6;font-style:italic;}

/* 상태 */
.state-box{text-align:center;padding:50px 20px;}
.spinner{width:26px;height:26px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-title{font-size:14px;font-weight:700;color:var(--grey);}

@media(max-width:480px){
  .sum-grid{grid-template-columns:repeat(2,1fr);}
  .week-table{font-size:11px;}
  .week-table th,.week-table td{padding:6px 6px;}
}
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="index.html">← 돌아가기</a>
  <div class="header-title">HISTORY</div>
  <div style="width:80px;"></div>
</div>

<div class="wrap">

  <!-- 전체 요약 -->
  <div class="section">
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-num" id="s-days">—</div><div class="sum-lbl">기록 일수</div></div>
      <div class="sum-card"><div class="sum-num" id="s-avg-steps">—</div><div class="sum-lbl">평균 걸음수</div></div>
      <div class="sum-card"><div class="sum-num" id="s-weight-diff">—</div><div class="sum-lbl">기간 체중 변화</div></div>
    </div>
  </div>

  <!-- 주간 평균 (화~월) -->
  <div class="section">
    <div class="sec-label">주간 평균 (화~월)</div>
    <div id="weekly-table-wrap">
      <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중...</div></div>
    </div>
  </div>

  <!-- 일별 기록 -->
  <div class="section">
    <div class="sec-label">일별 기록</div>
    <div class="filter-row">
      <input class="filter-inp" type="month" id="filter-month" placeholder="년-월">
      <div class="result-count" id="result-count"></div>
    </div>
    <div class="rec-list" id="record-list">
      <div class="state-box"><div class="spinner"></div><div class="state-title">불러오는 중...</div></div>
    </div>
  </div>

</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbysLmM_fov67_179-Td84CI8v5ZNW1aKSotd1eAFFhZkAX4mDuqGmZdX8F2C30Ed63kMQ/exec';
var DOW_KR  = ['일','월','화','수','목','금','토'];
var allData = [];

// ── helpers ──────────────────────────────────────────────────
function parseDate(raw) {
  var s = String(raw).slice(0,10);
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}

function fmtDate(d) {
  return (d.getMonth()+1)+'월 '+d.getDate()+'일';
}

// 해당 날짜가 속하는 주의 화요일 반환 (화~월 기준)
function getWeekTue(date) {
  var d = new Date(date); d.setHours(0,0,0,0);
  var dow = d.getDay();
  var diff = dow >= 2 ? dow - 2 : 7 + dow - 2;
  d.setDate(d.getDate() - diff);
  return d;
}

function avg(arr) {
  if (!arr.length) return null;
  return +(arr.reduce(function(s,v){return s+v;},0)/arr.length).toFixed(1);
}

// ── 데이터 로드 ───────────────────────────────────────────────
async function loadData() {
  try {
    var res  = await fetch(GAS_URL);
    var rows = await res.json();

    // 주간기록 제외, 날짜 필터
    allData = rows
      .filter(function(r){
        var d = String(r['날짜']||'');
        return d && !d.startsWith('주간');
      })
      .map(function(r){
        var d = parseDate(r['날짜']);
        return {
          date:     String(r['날짜']).slice(0,10),
          dateObj:  d,
          dow:      DOW_KR[d.getDay()],
          weight:   parseFloat(r['체중'])    || null,
          steps:    parseInt(r['걸음수'])    || null,
          sleep:    parseFloat(r['수면시간'])|| null,
          water:    r['수분']    || r['물']  || '',
          supp:     r['영양제']  || '',
          diet:     r['식단준수']|| '',
          walk_am:  r['아침산책']|| '',
          walk_noon:r['점심산책']|| '',
          walk_pm:  r['저녁산책']|| '',
          core:     r['복근루틴']|| '',
          phase:    r['단계']    || '',
          // 훈련기 컬럼 (하위호환)
          km:       parseFloat(r['러닝km'])  || null,
          min:      parseInt(r['시간min'])   || null,
          note:     r['메모']    || ''
        };
      })
      .sort(function(a,b){ return b.dateObj - a.dateObj; });

    // 날짜 중복 제거
    var seen = {};
    allData = allData.filter(function(r){
      if (seen[r.date]) return false;
      seen[r.date] = true; return true;
    });

    renderSummary();
    renderWeeklyTable();
    renderList();
  } catch(e) {
    document.getElementById('record-list').innerHTML =
      '<div class="state-box"><div class="state-title">⚠️ 데이터 로드 실패: '+e.message+'</div></div>';
    document.getElementById('weekly-table-wrap').innerHTML = '';
  }
}

// ── 전체 요약 ─────────────────────────────────────────────────
function renderSummary() {
  document.getElementById('s-days').textContent = allData.length;

  var stepRows = allData.filter(function(r){ return r.steps; });
  var avgSteps = stepRows.length ? Math.round(stepRows.reduce(function(s,r){return s+r.steps;},0)/stepRows.length) : null;
  document.getElementById('s-avg-steps').textContent = avgSteps ? avgSteps.toLocaleString() : '—';

  var wRows = allData.filter(function(r){ return r.weight; });
  if (wRows.length >= 2) {
    var diff = (wRows[0].weight - wRows[wRows.length-1].weight).toFixed(1);
    var el = document.getElementById('s-weight-diff');
    el.textContent = (diff > 0 ? '+' : '') + diff + 'kg';
    el.style.color = diff < 0 ? '#34D399' : diff > 0 ? '#F87171' : '#6B7FA8';
  }
}

// ── 주간 평균 테이블 (화~월) ──────────────────────────────────
function renderWeeklyTable() {
  // 주차별 그룹핑
  var weeks = {};
  allData.forEach(function(r) {
    var tue = getWeekTue(r.dateObj);
    var key = tue.getFullYear()+'-'+(tue.getMonth()+1)+'-'+tue.getDate();
    if (!weeks[key]) weeks[key] = {tue:tue, rows:[]};
    weeks[key].rows.push(r);
  });

  var keys = Object.keys(weeks).sort(function(a,b){ return b > a ? 1 : -1; });
  if (!keys.length) {
    document.getElementById('weekly-table-wrap').innerHTML =
      '<div style="font-size:12px;color:var(--grey);padding:10px 0;">기록이 없어요.</div>';
    return;
  }

  var nowTue = getWeekTue(new Date());
  var nowKey = nowTue.getFullYear()+'-'+(nowTue.getMonth()+1)+'-'+nowTue.getDate();

  var thead = '<tr>'
    + '<th style="text-align:left;">기간</th>'
    + '<th>평균<br>체중</th>'
    + '<th>평균<br>걸음수</th>'
    + '<th>평균<br>수면</th>'
    + '<th>식단<br>준수</th>'
    + '</tr>';

  var tbody = keys.map(function(key) {
    var w = weeks[key];
    var mon = new Date(w.tue); mon.setDate(w.tue.getDate() + 6);
    var period = (w.tue.getMonth()+1)+'/'+w.tue.getDate()
      + ' ~ ' + (mon.getMonth()+1)+'/'+mon.getDate();

    var weights = w.rows.filter(function(r){return r.weight;}).map(function(r){return r.weight;});
    var steps   = w.rows.filter(function(r){return r.steps;}).map(function(r){return r.steps;});
    var sleeps  = w.rows.filter(function(r){return r.sleep;}).map(function(r){return r.sleep;});
    var dietDays= w.rows.filter(function(r){return r.diet==='✅';}).length;

    var avgW  = avg(weights);
    var avgS  = steps.length  ? Math.round(steps.reduce(function(s,v){return s+v;},0)/steps.length) : null;
    var avgSl = avg(sleeps);
    var isCur = key === nowKey;

    return '<tr class="'+(isCur?'wk-cur':'')+'">'
      + '<td class="wk-period">'+period+'</td>'
      + '<td>'+(avgW  ? avgW+'kg' : '—')+'</td>'
      + '<td>'+(avgS  ? avgS.toLocaleString() : '—')+'</td>'
      + '<td>'+(avgSl ? avgSl+'h' : '—')+'</td>'
      + '<td>'+dietDays+'/'+w.rows.length+'일</td>'
      + '</tr>';
  }).join('');

  document.getElementById('weekly-table-wrap').innerHTML =
    '<table class="week-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}

// ── 일별 카드 ─────────────────────────────────────────────────
function renderCard(r, prevWeight) {
  // 체중 diff
  var diffHtml = '';
  if (r.weight && prevWeight) {
    var d = (r.weight - prevWeight).toFixed(1);
    var cls = d < 0 ? 'diff-down' : d > 0 ? 'diff-up' : '';
    diffHtml = '<div class="rec-wdiff '+cls+'">'+(d>0?'+':'')+d+'kg</div>';
  }

  // 메트릭 뱃지
  var metrics = '';
  // 회복기 데이터
  if (r.steps)  metrics += '<div class="rec-metric walk">👟 <span>'+r.steps.toLocaleString()+'보</span></div>';
  if (r.sleep)  metrics += '<div class="rec-metric walk">😴 <span>'+r.sleep+'h</span></div>';
  var walks = [r.walk_am?'아침':'', r.walk_noon?'점심':'', r.walk_pm?'저녁':''].filter(Boolean);
  if (walks.length) metrics += '<div class="rec-metric act">🚶 <span>'+walks.join('·')+'</span></div>';
  if (r.core==='✅') metrics += '<div class="rec-metric act">💪 <span>복근 완료</span></div>';
  // 훈련기 데이터 (하위호환)
  if (r.km) metrics += '<div class="rec-metric run">🏃 <span>'+r.km+'km</span></div>';

  return '<div class="rec-card">'
    + '<div class="rec-head">'
    +   '<div><div class="rec-date">'+fmtDate(r.dateObj)+' '+r.dow+'</div>'
    +   (r.phase ? '<div style="font-size:10px;color:var(--grey);margin-top:2px;">'+r.phase+'</div>' : '')
    +   '</div>'
    +   (r.weight ? '<div style="text-align:right"><div class="rec-weight">'+r.weight+'<span style="font-size:12px;color:var(--grey);">kg</span></div>'+diffHtml+'</div>' : '')
    + '</div>'
    + (metrics ? '<div class="rec-metrics">'+metrics+'</div>' : '')
    + (r.note   ? '<div class="rec-note">'+r.note+'</div>' : '')
    + '</div>';
}

// ── 일별 리스트 ───────────────────────────────────────────────
function renderList() {
  var month = document.getElementById('filter-month').value;
  var filtered = allData.filter(function(r){
    return !month || r.date.slice(0,7) === month;
  });

  document.getElementById('result-count').textContent = filtered.length + '개';

  if (!filtered.length) {
    document.getElementById('record-list').innerHTML =
      '<div class="state-box"><div class="state-title">📭 해당하는 기록이 없어요</div></div>';
    return;
  }

  var wMap = {};
  allData.filter(function(r){return r.weight;})
    .forEach(function(r,i,arr){ if(i+1<arr.length) wMap[r.date]=arr[i+1].weight; });

  document.getElementById('record-list').innerHTML =
    filtered.map(function(r){ return renderCard(r, wMap[r.date]); }).join('');
}

document.getElementById('filter-month').addEventListener('change', renderList);
loadData();
</script>
</body>
</html>
